<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Photo Ring 360 - Trung tâm</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width:100%; height:100%; overflow:hidden;
    background: radial-gradient(circle at top,#1f2a42,#04070f);
    font-family:"Segoe UI", Arial, sans-serif; color:#fff;
    display:flex; align-items:center; justify-content:center;
  }

  .viewport {
    width:min(96vw,1100px); height:min(84vh,720px);
    perspective:1600px;
    border:1px solid rgba(255,255,255,.2); border-radius:14px;
    background:rgba(0,0,0,.22); overflow:hidden; position:relative;
  }

  .ring {
    width:100%; height:100%; transform-style:preserve-3d;
  }

  .item {
    position:absolute; left:50%; top:50%;
    width:220px; height:165px; border-radius:14px;
    border:1px solid rgba(255,255,255,.35);
    background-size:cover; background-position:center;
    transform-style:preserve-3d; backface-visibility:hidden;
    transition: transform .3s ease, opacity .3s ease, filter .3s ease, box-shadow .3s ease;
    cursor:pointer; opacity:.28; pointer-events:auto;
  }

  .item.visible { opacity:1; }
  .item.near { opacity:.75; }
  .item.far { opacity:.2; }

  .item:hover { transform: scale(1.15) !important; }

  .item.selected {
    transform: scale(1.7) translateZ(180px) !important;
    z-index:9999; box-shadow:0 18px 30px rgba(0,0,0,.7);
    border-color:#fff; filter:brightness(1.15); opacity:1 !important;
  }

  .item.inactive { filter: blur(2px) brightness(.68); opacity:.24; }

  .preview {
    position:absolute; left:50%; bottom:16px; transform:translateX(-50%);
    width:min(90vw,760px); height:220px;
    border-radius:12px; border:1px solid rgba(255,255,255,.28);
    background:rgba(0,0,0,.54); display:flex;
    align-items:center; justify-content:center; overflow:hidden; z-index:10;
  }

  .preview img { width:100%; height:100%; object-fit:contain; opacity:0; transition:opacity .25s; }
  .preview img.show { opacity:1; }
  .preview .hint { color:#dde5f0; font-size:.95rem; }
</style>
</head>
<body>
  <div class="viewport">
    <div class="ring" id="ring"></div>
    <div class="preview">
      <span class="hint">Chọn 1 ảnh để xem lớn</span>
      <img id="zoomed" src="" alt="zoomed" />
    </div>
  </div>

  <script>
    const ring = document.getElementById('ring');
    const zoomed = document.getElementById('zoomed');
    const hint = document.querySelector('.preview .hint');
    const total = 23;
    const radius = 780;
    const items = [];
    let currentDeg = 0;
    let rotating = true;

    for (let i = 0; i < total; i++) {
      const item = document.createElement('div');
      item.className = 'item';
      item.dataset.index = i;
      const angle = (360 / total) * i;
      item.dataset.angle = angle;
      item.style.backgroundImage = url("https://picsum.photos/seed/ring-${i+1}/560/380");
      item.style.transform = `
        translate3d(-50%, -50%, 0)
        rotateY(${angle}deg)
        translateZ(${radius}px)
        rotateY(180deg)
      `;
      ring.appendChild(item);
      items.push(item);

      item.addEventListener('click', (e) => {
        e.stopPropagation();
        rotating = false;
        items.forEach(x => x.classList.remove('selected','inactive'));
        item.classList.add('selected');
        items.filter(x => x !== item).forEach(x => x.classList.add('inactive'));
        const idx = Number(item.dataset.index) + 1;
        hint.style.display = 'none';
        zoomed.src = https://picsum.photos/seed/zoom-${idx}/1200/720;
        zoomed.onload = () => zoomed.classList.add('show');
        currentDeg = -Number(item.dataset.angle);
        ring.style.transform = rotateX(0deg) rotateY(${currentDeg}deg);
        refreshVisibility();
      });
    }

    function normalizeAngle(a) {
      let x = a % 360;
      if (x < 0) x += 360;
      return x;
    }

    function refreshVisibility() {
      items.forEach(item => {
        const base = Number(item.dataset.angle);
        const view = normalizeAngle(base + currentDeg);
        const cos = Math.cos(view * Math.PI / 180);
        item.style.zIndex = Math.round((cos + 1) * 1500);
        if (view <= 50 || view >= 310) {
          item.classList.add('visible'); item.classList.remove('near','far');
        } else if (view <= 95 || view >= 265) {
          item.classList.add('near'); item.classList.remove('visible','far');
        } else {
          item.classList.add('far'); item.classList.remove('visible','near');
        }
      });
    }

    document.body.addEventListener('click', (e) => {
      if (!e.target.closest('.item')) {
        rotating = true;
        items.forEach(i => i.classList.remove('selected','inactive'));
        zoomed.classList.remove('show');
        hint.style.display = 'block';
      }
    });

    function animate() {
      if (rotating) {
        currentDeg = (currentDeg + 0.03) % 360;
        ring.style.transform = rotateX(0deg) rotateY(${currentDeg}deg);
      }
      refreshVisibility();
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
