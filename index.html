<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>8/3 Celebration - Rose, Fireworks & Balloons</title>
  <style>
    * { box-sizing: border-box; }
    body { 
      margin: 0; padding: 0; 
      background: #050818; 
      color: #edf2ff; font-family:'Segoe UI', Tahoma, sans-serif; overflow-x: hidden;
    }
    #fg-canvas {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none; z-index: 9999;
    }
    #balloons-container {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5000;
      overflow: hidden;
    }
    .balloon {
      position: absolute;
      bottom: 0;
      font-size: 2.5rem;
      user-select: none;
      opacity: 0.9;
      filter: drop-shadow(0 0 10px rgba(255, 105, 180, 0.6));
      animation: floatUp linear forwards;
      transform: translateY(0);
    }
    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg); opacity: 0.9; }
      100% { transform: translateY(-120vh) rotate(10deg); opacity: 0; }
    }
    #content-wrapper {
      opacity: 0;
      transition: opacity 2s ease, filter 1.2s ease;
      padding-bottom: 40px;
      position: relative;
      z-index: 1;
    }
    #content-wrapper.show { opacity: 1; }
    .dim-bg { filter: blur(2px) brightness(0.4); }
    #rose-intro {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, 100%) scale(0); 
      z-index: 10000;
      transition: all 1.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-align: center;
      pointer-events: none;
    }
    #rose-intro.bloom { transform: translate(-50%, -50%) scale(1.2); }
    #rose-intro.fade-out { transform: translate(-50%, -20%) scale(0); opacity: 0; }
    .rose-svg {
      width: 220px; height: 220px;
      filter: drop-shadow(0 0 30px rgba(255, 20, 147, 0.6));
    }
    .greeting-text {
      margin-top: 20px; font-size: 1.6rem; font-weight: bold;
      color: #ffb6c1; text-shadow: 0 0 15px rgba(255,182,193,0.6);
    }
    .header-container { text-align: center; padding: 50px 20px; background: rgba(255, 255, 255, 0.02); border-bottom: 1px solid rgba(255, 182, 193, 0.1); margin-bottom: 20px; }
    .main-title { margin: 0; font-size: 2.5rem; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 15px; text-transform: uppercase; }
    .text-gradient { background: linear-gradient(90deg, #ffb6c1, #ffffff, #ffc0cb, #ffffff, #ffb6c1); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; animation: gradient_soft 5s linear infinite; -webkit-text-stroke: 1.5px #fff9e5; text-shadow: 0 0 15px rgba(255, 182, 193, 0.3); }
    .flower-icon { -webkit-text-fill-color: initial; -webkit-text-stroke: 0px; font-size: 2.8rem; }
    @keyframes gradient_soft { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    /* Hiệu ứng nhấp nháy nhẹ cho câu hướng dẫn */
    @keyframes gentlePulse {
      0% { opacity: 0.7; text-shadow: 0 0 0px #ffb6c1; }
      50% { opacity: 1; text-shadow: 0 0 12px #ffb6c1; }
      100% { opacity: 0.7; text-shadow: 0 0 0px #ffb6c1; }
    }
    /* Container cho lời hướng dẫn - căn giữa hoàn hảo */
    .instruction-box {
      text-align: center;
      margin: 0 auto 30px auto;
      width: fit-content;
      max-width: 90%;
      background: rgba(255, 182, 193, 0.15);
      backdrop-filter: blur(8px);
      border-radius: 60px;
      padding: 12px 28px;
      border: 1px solid rgba(255, 182, 193, 0.4);
      box-shadow: 0 0 20px rgba(255, 105, 180, 0.3);
    }
    .instruction-text {
      font-size: 1.3rem;
      font-weight: 600;
      color: #ffb6c1;
      animation: gentlePulse 2s infinite;
      letter-spacing: 1px;
      display: inline-block;
      white-space: nowrap;
    }
    .stage { display:flex; flex-direction:column; gap:24px; max-width: calc(100vw - 40px); margin:auto; }
    .lane {
      position: relative;
      overflow: hidden;
      height: 180px;
      border-radius: 14px;
      border: 1px solid rgba(185,205,255,.15);
      background: rgba(2,12,32,.36);
      will-change: transform;
    }
    .track {
      display: flex;
      align-items: center;
      gap: 18px;
      height: 100%;
      width: fit-content;
      will-change: transform;
      backface-visibility: hidden;
      transform: translate3d(0,0,0);
      position: relative;
    }
    .item {
      width: 210px;
      min-width: 210px;
      border-radius: 11px;
      overflow: hidden;
      box-shadow: 0 9px 15px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.17);
      flex-shrink: 0;
    }
    .placeholder {
      width: 100%;
      height: 130px;
      background: linear-gradient(145deg, #ffb6c1, #ff99cc);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      color: white;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      border-radius: 11px 11px 0 0;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }
    .placeholder:hover {
      transform: scale(1.02);
      background: linear-gradient(145deg, #ff99cc, #ffb6c1);
    }
    .placeholder.opened {
      background: linear-gradient(145deg, #c0c0c0, #a0a0a0);
    }
    .caption { padding: 8px 6px; text-align:center; font-size:12px; background: rgba(0,0,0,.4); }
    #lightbox-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    #lightbox-overlay.active { opacity: 1; pointer-events: auto; }
    #lightbox-content {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 30px;
      transform: scale(0.4);
      opacity: 0;
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s ease;
      max-width: 90vw;
      position: relative;
    }
    #lightbox-overlay.active #lightbox-content { transform: scale(1); opacity: 1; }
    .polaroid-frame {
      background: rgb(255, 255, 255);
      padding: 16px 16px 42px 16px;
      border: 2px solid rgba(0, 0, 0, 0.2);
      box-shadow: 0 20px 30px rgba(0, 0, 0, 0.3), inset 0 0 0 4px rgba(0, 0, 0, 0.6);
      border-radius: 6px;
      display: inline-block;
      max-width: 60vw;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      position: relative;
    }
    .polaroid-frame:hover {
      transform: scale(1.02);
      box-shadow: 0 25px 35px rgba(0, 0, 0, 0.4), inset 0 0 0 4px rgba(0, 0, 0, 0.8);
    }
    .polaroid-frame img {
      border: 3px solid rgba(0, 0, 0, 0.3);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      display: block;
      width: 100%;
      height: auto;
      transition: border-color 0.3s ease;
    }
    .polaroid-frame:hover img { border-color: rgba(0, 0, 0, 0.5); }
    .polaroid-frame::after {
      content: "❤️";
      position: absolute;
      bottom: -10px;
      left: -10px;
      font-size: 40px;
      color: #ff4d6d;
      transform: rotate(-12deg);
      filter: drop-shadow(4px 4px 4px rgba(0, 0, 0, 0.25));
      pointer-events: none;
      z-index: 10;
      text-shadow: 2px 2px 0 rgba(255, 255, 255, 0.5);
      line-height: 1;
    }
    .polaroid-frame::before {
      content: "🎀";
      position: absolute;
      top: -10px;
      right: -10px;
      font-size: 40px;
      color: #ff99cc;
      transform: rotate(12deg);
      filter: drop-shadow(4px 4px 4px rgba(0, 0, 0, 0.25));
      pointer-events: none;
      z-index: 10;
      text-shadow: 2px 2px 0 rgba(255, 255, 255, 0.5);
      line-height: 1;
    }
    .spinner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #ffb6c1;
      animation: spin 1s ease-in-out infinite;
      display: none;
      z-index: 20;
    }
    @keyframes spin {
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }
    #lightbox-img {
      max-height: 70vh;
      max-width: 100%;
      border-radius: 2px;
      display: block;
      object-fit: contain;
    }
    #lightbox-note {
      background-color: #f9efd8;
      background-image: repeating-linear-gradient(45deg, rgba(0,0,0,0.02) 0px, rgba(0,0,0,0.02) 2px, transparent 2px, transparent 8px),
                        repeating-linear-gradient(135deg, rgba(0,0,0,0.02) 0px, rgba(0,0,0,0.02) 2px, transparent 2px, transparent 8px);
      color: #333;
      padding: 40px 35px 35px;
      width: 450px;
      border-radius: 8px;
      box-shadow: 3px 6px 20px rgba(0,0,0,0.5);
      font-size: 1.4rem;
      line-height: 1.7;
      position: relative;
      transform: rotate(2deg);
      border: 1px solid rgba(0,0,0,0.1);
      outline: 1px solid rgba(255,245,200,0.4);
      outline-offset: 2px;
    }
    #lightbox-note::before {
      content: '';
      position: absolute;
      top: 6px;
      left: 6px;
      right: 6px;
      bottom: 6px;
      border: 2px solid #b38b5a;
      border-radius: 10px;
      opacity: 0.5;
      pointer-events: none;
      box-shadow: 0 0 4px rgba(0,0,0,0.1);
    }
    #lightbox-note::after {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      border: 1px dashed #a0714b;
      border-radius: 12px;
      opacity: 0.3;
      pointer-events: none;
    }
    #lightbox-close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 2.5rem;
      color: white;
      background: none;
      border: none;
      cursor: pointer;
      transition: transform 0.3s;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }
    #lightbox-close:hover { transform: scale(1.2) rotate(90deg); color: #ffb6c1; }
    @media (max-width: 768px) {
      #lightbox-content { flex-direction: column; gap: 20px; }
      .polaroid-frame { max-width: 90vw; padding: 8px 8px 25px 8px; }
      #lightbox-img { max-height: 50vh; }
      #lightbox-note { width: 90vw; max-width: 450px; transform: rotate(0deg); font-size: 1.2rem; padding: 30px 20px 25px; }
      .instruction-text { font-size: 1rem; white-space: normal; }
      .instruction-box { padding: 10px 20px; }
    }
    #background-fixed {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('ảnh nền 3.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
      opacity: 0.5;
    }
    .gift-container {
      text-align: center;
      margin: 40px auto 20px;
      padding: 20px;
      max-width: 400px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      backdrop-filter: blur(5px);
      border: 2px solid rgba(255, 215, 0, 0.5);
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    .gift-container:hover {
      transform: scale(1.02);
    }
    .gift-link {
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .gift-box {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      font-size: 5rem;
      line-height: 1;
      margin-bottom: 15px;
      transition: transform 0.3s ease;
    }
    .gift-emoji.large { font-size: 6rem; }
    .gift-link:hover .gift-box { transform: scale(1.1); }
    .gift-message {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.25);
      padding: 12px 20px;
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      font-size: 1.5rem;
      font-weight: bold;
      color: #fff;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
    }
    .gift-message .arrow {
      font-size: 2rem;
      animation: bounce 1s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(5px); }
    }
    /* Popup thông báo */
    .custom-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      background: linear-gradient(135deg, #ffb6c1, #ff99cc);
      color: #fff;
      padding: 20px 40px;
      border-radius: 50px;
      font-size: 1.8rem;
      font-weight: bold;
      text-align: center;
      box-shadow: 0 0 40px rgba(255, 105, 180, 0.6);
      z-index: 100001;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
      white-space: nowrap;
    }
    .custom-popup.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
      pointer-events: auto;
    }
    @media (max-width: 768px) {
      .custom-popup { font-size: 1.2rem; padding: 15px 25px; white-space: normal; width: 80%; text-align: center; }
    }
    @keyframes bounce {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(5px); }
    }
    @media (max-width: 768px) {
      .gift-box { font-size: 4rem; }
      .gift-emoji.large { font-size: 5rem; }
      .gift-message { font-size: 1.2rem; padding: 10px 15px; }
      .gift-message .arrow { font-size: 1.6rem; }
    }
  </style>
</head>

        "Ngày 8/3, chúc zhun sẽ có thêm nhiều thành tích mới trong học tập; chúc cậu sẽ đạt được những ước mơ của mình và bay xa hơn nữa nhé.",
        "Chúc Thảo Nhi - lớp trưởng yêu quý của chúng ta - một ngày 8/3 thật vui vẻ; chúc Thảo Nhi thêm xinh đẹp, thêm học giỏi và sẽ đỗ vào trường đại học mà mình yêu thích nhé.",
        "Hello bạn Ngọc Nhi, nhân ngày Phụ nữ Việt Nam, các anh em 12 Sử xin chúc bạn luôn tự tin, hạnh phúc, tràn đầy năng lượng tích cực nhé bạn yêu! Quan trọng hơn hết chúc bạn xuất ngoại Đức thành công và hoàn thành được ý nguyện của mình nhé!",
        "Gửi Thục Anh, nhớ ngày đầu cậu nghịch ngợm siêu quậy mà giờ trầm lắng hơn nhiều rồi nhỉ. 8 tháng 3 này, chúc cậu đạt được mọi mục tiêu trong năm học cuối cấp nhé, nhất là thi tốt nghiệp đỗ ngay nguyện vọng 1 và giật cái bằng IELTS thật oách như mong đợi. Cố lên nha",
        "Chúc Thùy Anh 8 tháng 3 vui vẻ nhé! Vẫn luôn chăm học, ngoan giỏi và đạt được nhiều thành tích như trước, năm này chúc cậu đỗ nguyện vọng 1 đại học đúng như mong đợi. Và đương nhiên, mong các tuyển thủ game mà cậu hâm mộ luôn thắng lớn, đạt giải cao nha",

        "Gửi Trịnh Diệp, cô bạn luôn chăm chỉ, học tốt, lại còn tích cực và có trách nhiệm trong các hoạt động của lớp nhóm. 8 tháng 3 này, chúc cậu gặt hái thêm thật nhiều thành công trong học tập sắp tới, và đương nhiên là phải đỗ nguyện vọng 1 đại học như mong đợi nha",
        "Gửi Thu Uyên, cô bạn vừa ngoan vừa học giỏi, lại còn có thành tích tiếng Trung rất ấn tượng nữa! 8 tháng 3 này, chúc cậu gặt hái thêm thật nhiều thành công trong học tập sắp tới, và đương nhiên là phải đỗ nguyện vọng 1 vào trường đại học mà cậu thích nha. Cố lên nha",
        "Gửi Khánh Ngọc, 8 tháng 3 này, chúc cậu đạt điểm IELTS cao như mong đợi trong đợt thi sắp tới, và chắc chắn là phải đỗ nguyện vọng 1 vào trường đại học mà cậu thích nữa nhé. Đặc biệt, chúc tình yêu của cậu với người bạn trai luôn hạnh phúc và bền chặt, mãi như ngày đầu nha",
        "chúc cậu lúc nào cũng rạng rỡ, yêu đời như cái tên của cậu vậy. Hy vọng năm tới cậu sẽ làm được thật nhiều điều mình thích và luôn vui vẻ bên mọi người.",
        "Chúc Hải An luôn bình an, vui tươi và cứ là chính mình thật thoải mái nhé. Cậu hiền lành và dễ mến lắm, mong mọi chuyện đều suôn sẻ với cậu.",
        "Chúc Ngọc Hà lúc nào cũng vui, học tốt và luôn giữ được nụ cười dễ thương như bây giờ. Cảm ơn cậu vì đã là người bạn đáng yêu, chúc cậu thật nhiều niềm vui nhé.",
        
      ];

      const captions = [
        "Anngos", "bgh", "bngoc", "chidown", "chingo", "hang", "hanh", "hlinh",
        "hngan", "mdiep", "mtrang", "zhun", "nhitran", "nnhi", "thuc", "thuy",
        "tranh", "trdiep", "uyen", "kngoc", "mhoa", "haian", "ngocha"
      ];

      // ========== CẤU HÌNH HÀNG ==========
      const rowsConfig = [
        { start: 0, count: 8, marginLeft: 0 },    // hàng 1: 8 ảnh
        { start: 8, count: 7, marginLeft: 70 },   // hàng 2: 7 ảnh
        { start: 15, count: 8, marginLeft: 35 }   // hàng 3: 8 ảnh
      ];

      const itemWidth = 210;
      const gap = 18;
      // Tốc độ: 0.08 pixel/ms = 80 pixel/giây (chậm, dễ nhìn)
      const speed = 0.08;

      // Lưu các đối tượng hàng để animate
      const rows = [];

      function buildGallery() {
        const stage = document.getElementById('main-stage');
        stage.innerHTML = '';

        rowsConfig.forEach((cfg, idx) => {
          const rowImages = imageUrls.slice(cfg.start, cfg.start + cfg.count);
          const lane = document.createElement('div');
          lane.className = 'lane';
          if (cfg.marginLeft) lane.style.marginLeft = cfg.marginLeft + 'px';

          const track = document.createElement('div');
          track.className = 'track';

          // Tạo các item (mỗi item là một ảnh riêng, không trùng)
          rowImages.forEach((url, i) => {
            const globalIndex = cfg.start + i;
            const item = createItem(url, globalIndex);
            track.appendChild(item);
          });

          lane.appendChild(track);
          stage.appendChild(lane);

          // Lưu thông tin hàng
          rows.push({
            track,
            lane,
            items: [...track.children],
            itemWidth,
            gap,
            currentTranslate: 0,
            lastTimestamp: null
          });
        });
      }

      function createItem(url, globalIndex) {
        const item = document.createElement('div');
        item.className = 'item';

        const placeholder = document.createElement('div');
        placeholder.className = 'placeholder';
        placeholder.setAttribute('data-src', url);
        placeholder.setAttribute('data-index', globalIndex);
        placeholder.innerHTML = '❓';

        const caption = document.createElement('div');
        caption.className = 'caption';
        caption.textContent = captions[globalIndex % captions.length];

        item.appendChild(placeholder);
        item.appendChild(caption);
        return item;
      }

      // Hàm xử lý vòng lặp vô hạn không trùng ảnh
      function updateRow(row, deltaTime) {
        if (!deltaTime) return;
        // Di chuyển theo tốc độ
        const distance = speed * deltaTime;
        row.currentTranslate -= distance;

        // Lấy width của item đầu tiên + gap
        const firstItem = row.items[0];
        const itemFullWidth = firstItem.offsetWidth + gap;

        // Nếu dịch chuyển vượt quá chiều rộng của item đầu, chuyển item đầu xuống cuối
        if (Math.abs(row.currentTranslate) >= itemFullWidth) {
          // Chuyển item đầu tiên xuống cuối
          const removedItem = row.items.shift();
          row.items.push(removedItem);
          row.track.appendChild(removedItem); // di chuyển trong DOM

          // Điều chỉnh lại translate để giữ vị trí mượt
          row.currentTranslate += itemFullWidth;
        }

        // Áp dụng transform
        row.track.style.transform = `translate3d(${row.currentTranslate}px, 0, 0)`;
      }

      let lastFrameTime = null;
      function animateRows(now) {
        if (!lastFrameTime) {
          lastFrameTime = now;
          requestAnimationFrame(animateRows);
          return;
        }
        const delta = Math.min(100, now - lastFrameTime); // giới hạn delta max 100ms
        if (delta > 0) {
          rows.forEach(row => updateRow(row, delta));
        }
        lastFrameTime = now;
        requestAnimationFrame(animateRows);
      }

      buildGallery();

      // Đợi một chút để DOM ổn định rồi bắt đầu animation
      setTimeout(() => {
        // Tính toán lại offsetWidth của các item sau khi đã render
        rows.forEach(row => {
          // Đảm bảo mỗi item có width chuẩn
          if (row.items.length) {
            // Reset translate về 0
            row.currentTranslate = 0;
            row.track.style.transform = `translate3d(0, 0, 0)`;
          }
        });
        requestAnimationFrame(animateRows);
      }, 100);

      // ========== PHÁO HOA (giảm tải) ==========
      const canvas = document.getElementById('fg-canvas');
      const ctx = canvas.getContext('2d');
      const wrapper = document.getElementById('content-wrapper');
      const rose = document.getElementById('rose-intro');
      let particles = [];

      function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
      window.addEventListener('resize', resize);
      resize();

      class Particle {
        constructor(x, y, color, size, speedMult) {
          this.x = x; this.y = y; this.color = color; this.size = size;
          this.velocity = { x: (Math.random() - 0.5) * (speedMult * 12), y: (Math.random() - 0.5) * (speedMult * 12) };
          this.alpha = 1; this.friction = 0.96; this.gravity = 0.07;
        }
        draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.globalAlpha = this.alpha; ctx.fill(); }
        update() { this.velocity.x *= this.friction; this.velocity.y *= this.friction; this.velocity.y += this.gravity; this.x += this.velocity.x; this.y += this.velocity.y; this.alpha -= 0.012; }
      }

      function createFirework(x, y, isBig = false) {
        const colors = ['#ffb6c1', '#ffffff', '#ffd700', '#ff69b4', '#00f2ff', '#a0feff'];
        const count = isBig ? 50 : 16;
        for (let i = 0; i < count; i++) {
          particles.push(new Particle(x, y, colors[Math.floor(Math.random() * colors.length)], isBig ? 2.2 : 1.4, isBig ? 1.3 : 1));
        }
      }

      function animateParticles() {
        requestAnimationFrame(animateParticles);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < particles.length; i++) {
          if (particles[i].alpha > 0) {
            particles[i].update();
            particles[i].draw();
          } else {
            particles.splice(i, 1);
            i--;
          }
        }
      }
      animateParticles();

      // ========== BÓNG BAY ==========
      function createBalloons() {
        const container = document.getElementById('balloons-container');
        const colors = ['#ff6b9d', '#ff99cc', '#ffb3ba', '#ffd1dc', '#ffb6c1', '#fba0e0', '#fd9fc8'];
        const numberOfBalloons = 20;  // bạn có thể tăng lên 25 hoặc 30 nếu muốn nhiều trái tim hơn
        for (let i = 0; i < numberOfBalloons; i++) {
          const balloon = document.createElement('div');
          balloon.className = 'balloon';
          balloon.innerHTML = '❤️';
          balloon.style.color = colors[Math.floor(Math.random() * colors.length)];
          const size = 1.6 + Math.random() * 1.8;
          balloon.style.fontSize = size + 'rem';
          balloon.style.left = Math.random() * 100 + '%';
          const duration = 3 + Math.random() * 3;
          balloon.style.animationDuration = duration + 's';
          balloon.style.animationDelay = (Math.random() * 2) + 's';
          container.appendChild(balloon);
          setTimeout(() => {
            if (balloon.parentNode) balloon.remove();
          }, (duration + parseFloat(balloon.style.animationDelay)) * 1000);
        }
      }

      // ========== KỊCH BẢN MỞ ĐẦU ==========
      function startExperience() {
        setTimeout(() => {
          rose.classList.add('bloom');
          wrapper.classList.add('show');
          wrapper.classList.add('dim-bg');
          createBalloons();
          // Pháo hoa ban đầu: 7 loạt, mỗi loạt cách 450ms
          for(let i = 0; i < 7; i++) {
            setTimeout(() => {
              createFirework(Math.random() * canvas.width, Math.random() * canvas.height * 0.7, true);
            }, i * 450);
          }
        }, 500);
        setTimeout(() => {
          rose.classList.add('fade-out');
          wrapper.classList.remove('dim-bg');
        }, 7000);
      }
      startExperience();

      window.addEventListener('mousedown', (e) => {
        createFirework(e.clientX, e.clientY, false);
      });

      // ========== POPUP THÔNG BÁO ==========
      const giftButton = document.getElementById('giftButton');
      const popup = document.getElementById('customPopup');
      let popupTimeout;

      function showPopup() {
        popup.classList.add('show');
        if (popupTimeout) clearTimeout(popupTimeout);
        popupTimeout = setTimeout(() => {
          popup.classList.remove('show');
        }, 3000);
      }

      giftButton.addEventListener('click', (e) => {
        e.preventDefault();
        showPopup();
      });

      // ========== LIGHTBOX ==========
      const lightboxOverlay = document.getElementById('lightbox-overlay');
      const lightboxImg = document.getElementById('lightbox-img');
      const lightboxNote = document.getElementById('lightbox-note');
      const closeBtn = document.getElementById('lightbox-close');
      const spinner = document.querySelector('.spinner');

      function handleImageError(imgElement) {
        imgElement.src = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%23ffccdd"/%3E%3Ctext x="50" y="55" font-size="40" text-anchor="middle" fill="%23ff6699"%3E🌸%3C/text%3E%3C/svg%3E';
      }

      document.getElementById('main-stage').addEventListener('click', function(e) {
        const placeholder = e.target.closest('.placeholder');
        if (!placeholder) return;
        const src = placeholder.getAttribute('data-src');
        const index = parseInt(placeholder.getAttribute('data-index'));
        if (src) {
          spinner.style.display = 'block';
          lightboxImg.style.opacity = '0';
          const img = new Image();
          img.onload = () => {
            lightboxImg.src = src;
            lightboxImg.style.opacity = '1';
            spinner.style.display = 'none';
          };
          img.onerror = () => {
            handleImageError(lightboxImg);
            lightboxImg.style.opacity = '1';
            spinner.style.display = 'none';
          };
          img.src = src;
          if (!isNaN(index) && messages[index]) {
            lightboxNote.innerHTML = `<p><strong>Gửi chị em 12 sử,</strong><br><br>${messages[index]}</p>`;
          } else {
            lightboxNote.innerHTML = `<p><strong>Gửi chị em 12 sử,</strong><br><br>Chúc chị em một ngày 8/3 thật rực rỡ! 💖💐</p>`;
          }
          lightboxOverlay.classList.add('active');
          if (!placeholder.classList.contains('opened')) {
            placeholder.innerHTML = '💕';
            placeholder.classList.add('opened');
          }
        }
        e.stopPropagation();
      });

      function closeLightbox() {
        lightboxOverlay.classList.remove('active');
      }
      closeBtn.addEventListener('click', closeLightbox);
      lightboxOverlay.addEventListener('click', (e) => {
        if (e.target === lightboxOverlay) closeLightbox();
      });
      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeLightbox();
      });
    })();
  </script>
